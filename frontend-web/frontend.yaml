apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
    spec:
      containers:
      - name: frontend-web
        image: divyal27/frontend-web:latest # <-- CHANGE THIS to your Dockerhub username
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30009 # This is the port you will use in your browser
